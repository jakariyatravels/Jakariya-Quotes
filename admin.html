<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jakariya Holidays · Quote Builder</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--red:#D0191A;--red-dark:#a81415;--red-light:#fff0f0;--red-mid:#f8d7d7;--g0:#f9fafb;--g1:#f3f4f6;--g2:#e5e7eb;--g3:#d1d5db;--g4:#9ca3af;--g5:#6b7280;--g6:#4b5563;--g9:#111827;--r:10px}
html,body{width:100%;min-height:100vh}
body{font-family:"DM Sans",sans-serif;background:#f0f2f5;color:var(--g9);-webkit-tap-highlight-color:transparent}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--g9);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px}
.login-box{background:white;border-radius:16px;padding:32px 28px;width:100%;max-width:360px;text-align:center}
.login-logo{width:180px;margin:0 auto 20px}
.login-title{font-size:18px;font-weight:700;color:var(--g9);margin-bottom:4px}
.login-sub{font-size:13px;color:var(--g4);margin-bottom:24px}
.login-input{width:100%;padding:12px 14px;border:1.5px solid var(--g2);border-radius:9px;font-family:"DM Sans",sans-serif;font-size:15px;outline:none;margin-bottom:12px;transition:border-color .15s}
.login-input:focus{border-color:var(--red)}
.login-btn{width:100%;padding:13px;background:var(--red);color:white;border:none;border-radius:9px;font-family:"DM Sans",sans-serif;font-size:15px;font-weight:700;cursor:pointer}
.login-err{color:var(--red);font-size:12px;margin-top:8px;display:none}

/* HEADER */
.header{background:var(--g9);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-logo{height:36px}
.header-title{font-size:13px;color:white;font-weight:600;background:var(--red);padding:4px 12px;border-radius:999px}

/* MAIN */
.main{max-width:780px;margin:0 auto;padding:20px 16px 80px}

/* SECTION CARDS */
.card{background:white;border-radius:var(--r);border:1px solid var(--g2);margin-bottom:14px;overflow:hidden}
.card-header{padding:14px 16px;border-bottom:1px solid var(--g2);display:flex;align-items:center;justify-content:space-between;background:var(--g0)}
.card-title{font-size:15px;font-weight:700;color:var(--g9);display:flex;align-items:center;gap:8px}
.card-icon{width:28px;height:28px;border-radius:7px;background:var(--red-light);display:flex;align-items:center;justify-content:center;font-size:14px}
.card-body{padding:16px}

/* FORM ELEMENTS */
.form-row{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.form-group{display:flex;flex-direction:column;gap:4px;flex:1;min-width:140px}
.form-group.full{flex:100%}
label{font-size:11px;font-weight:600;color:var(--g5);text-transform:uppercase;letter-spacing:.05em}
input,select,textarea{padding:10px 12px;border:1.5px solid var(--g2);border-radius:8px;font-family:"DM Sans",sans-serif;font-size:14px;color:var(--g9);outline:none;width:100%;transition:border-color .15s;background:white}
input:focus,select:focus,textarea:focus{border-color:var(--red)}
textarea{resize:vertical;min-height:60px}

/* FLIGHT ROWS */
.flight-list{display:flex;flex-direction:column;gap:8px}
.flight-row{background:var(--g0);border:1.5px solid var(--g2);border-radius:9px;padding:12px;position:relative}
.flight-row-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.flight-row-grid .full{grid-column:1/-1}
.remove-btn{position:absolute;top:8px;right:8px;width:24px;height:24px;border-radius:50%;background:var(--red-mid);border:none;color:var(--red);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;font-weight:700}
.add-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:9px;border:1.5px dashed var(--g3);border-radius:9px;background:transparent;font-family:"DM Sans",sans-serif;font-size:13px;font-weight:600;color:var(--g5);cursor:pointer;width:100%;margin-top:8px;transition:all .15s}
.add-btn:hover{border-color:var(--red);color:var(--red);background:var(--red-light)}

/* TOGGLE */
.toggle-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.toggle{position:relative;width:40px;height:22px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:var(--g3);border-radius:999px;cursor:pointer;transition:.2s}
.toggle-slider:before{content:"";position:absolute;width:16px;height:16px;left:3px;top:3px;background:white;border-radius:50%;transition:.2s}
.toggle input:checked+.toggle-slider{background:var(--red)}
.toggle input:checked+.toggle-slider:before{transform:translateX(18px)}
.toggle-label{font-size:14px;font-weight:500;color:var(--g6)}

/* GENERATE BTN */
.generate-btn{width:100%;padding:16px;background:var(--red);color:white;border:none;border-radius:var(--r);font-family:"DM Sans",sans-serif;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s;margin-top:8px}
.generate-btn:hover{background:var(--red-dark)}

/* OUTPUT */
.output-box{background:var(--g9);border-radius:var(--r);padding:16px;margin-top:14px;display:none}
.output-box.vis{display:block}
.output-label{font-size:11px;font-weight:700;color:var(--g4);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.output-link{font-size:14px;color:#60a5fa;word-break:break-all;margin-bottom:12px;line-height:1.5}
.copy-btn{display:flex;align-items:center;gap:6px;padding:10px 16px;background:#1f2937;color:white;border:none;border-radius:8px;font-family:"DM Sans",sans-serif;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:8px}
.preview-btn{display:flex;align-items:center;gap:6px;padding:10px 16px;background:var(--red);color:white;border:none;border-radius:8px;font-family:"DM Sans",sans-serif;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none}
.output-btns{display:flex;gap:8px;flex-wrap:wrap}
.output-note{font-size:11px;color:var(--g4);margin-top:10px;line-height:1.6}

@media(max-width:500px){
  .form-row{flex-direction:column}
  .flight-row-grid{grid-template-columns:1fr}
}
</style>
</head>

<div class="main">

  <!-- CLIENT INFO -->
  <div class="card">
    <div class="card-header">
      <div class="card-title"><div class="card-icon">👤</div> Client & Trip Info</div>
    </div>
    <div class="card-body">
      <div class="form-row">
        <div class="form-group"><label>Client Name</label><input type="text" id="client-name" placeholder="e.g. Mr. Ahmed Ali"></div>
        <div class="form-group"><label>Quote Valid Until</label><input type="date" id="quote-valid"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>From City</label><input type="text" id="from-city" placeholder="e.g. Madurai"></div>
        <div class="form-group"><label>To City</label><input type="text" id="to-city" placeholder="e.g. Dubai"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Trip Type</label>
          <select id="trip-type" onchange="toggleReturn()">
            <option value="oneway">One Way</option>
            <option value="roundtrip" selected>Round Trip</option>
          </select>
        </div>
        <div class="form-group"><label>Passengers</label><input type="number" id="pax" value="1" min="1" max="9"></div>
      </div>
    </div>
  </div>

  <!-- ONWARD FLIGHTS -->
  <div class="card">
    <div class="card-header">
      <div class="card-title"><div class="card-icon">✈️</div> Onward Flights</div>
    </div>
    <div class="card-body">
      <div class="form-row">
        <div class="form-group"><label>Departure Date</label><input type="date" id="onward-date"></div>
        <div class="form-group"><label>From Airport Code</label><input type="text" id="onward-from" placeholder="e.g. IXM" maxlength="4" style="text-transform:uppercase"></div>
        <div class="form-group"><label>To Airport Code</label><input type="text" id="onward-to" placeholder="e.g. DXB" maxlength="4" style="text-transform:uppercase"></div>
      </div>
      <div class="flight-list" id="onward-list"></div>
      <button class="add-btn" onclick="addFlight('onward')">＋ Add Flight Option</button>
    </div>
  </div>

  <!-- RETURN FLIGHTS -->
  <div class="card" id="return-card">
    <div class="card-header">
      <div class="card-title"><div class="card-icon">🔄</div> Return Flights</div>
    </div>
    <div class="card-body">
      <div class="form-row">
        <div class="form-group"><label>Return Date</label><input type="date" id="return-date"></div>
        <div class="form-group"><label>From Airport Code</label><input type="text" id="return-from" placeholder="e.g. DXB" maxlength="4" style="text-transform:uppercase"></div>
        <div class="form-group"><label>To Airport Code</label><input type="text" id="return-to" placeholder="e.g. IXM" maxlength="4" style="text-transform:uppercase"></div>
      </div>
      <div class="flight-list" id="return-list"></div>
      <button class="add-btn" onclick="addFlight('return')">＋ Add Flight Option</button>
    </div>
  </div>

  <!-- HOTELS -->
  <div class="card">
    <div class="card-header">
      <div class="card-title"><div class="card-icon">🏨</div> Hotel Options</div>
      <div class="toggle-row" style="margin:0">
        <label class="toggle"><input type="checkbox" id="hotel-toggle" onchange="toggleSection('hotel-body',this)"><span class="toggle-slider"></span></label>
        <span class="toggle-label" style="font-size:12px">Include hotels</span>
      </div>
    </div>
    <div class="card-body" id="hotel-body" style="display:none">
      <div class="flight-list" id="hotel-list"></div>
      <button class="add-btn" onclick="addHotel()">＋ Add Hotel Option</button>
    </div>
  </div>

  <!-- VISA -->
  <div class="card">
    <div class="card-header">
      <div class="card-title"><div class="card-icon">🛂</div> Visa Info</div>
      <div class="toggle-row" style="margin:0">
        <label class="toggle"><input type="checkbox" id="visa-toggle" onchange="toggleSection('visa-body',this)"><span class="toggle-slider"></span></label>
        <span class="toggle-label" style="font-size:12px">Include visa</span>
      </div>
    </div>
    <div class="card-body" id="visa-body" style="display:none">
      <div class="form-row">
        <div class="form-group"><label>Visa Type</label><input type="text" id="visa-type" placeholder="e.g. Tourist Visa 30 Days"></div>
        <div class="form-group"><label>Visa Fee (₹)</label><input type="number" id="visa-fee" placeholder="e.g. 8500"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Processing Time</label><input type="text" id="visa-time" placeholder="e.g. 3-5 working days"></div>
        <div class="form-group full"><label>Notes</label><input type="text" id="visa-notes" placeholder="e.g. Passport valid 6 months required"></div>
      </div>
    </div>
  </div>

  <!-- NOTES -->
  <div class="card">
    <div class="card-header"><div class="card-title"><div class="card-icon">📝</div> Additional Notes</div></div>
    <div class="card-body">
      <textarea id="extra-notes" placeholder="e.g. Prices valid for 24 hours. Subject to availability."></textarea>
    </div>
  </div>

  <!-- GENERATE -->
  <button class="generate-btn" onclick="generateQuote()">✦ Generate Client Quote Link</button>

  <div class="output-box" id="output-box">
    <div class="output-label">Your shareable quote link</div>
    <div class="output-link" id="output-link"></div>
    <div class="output-btns">
      <button class="copy-btn" onclick="copyLink()">📋 Copy Link</button>
      <a class="preview-btn" id="preview-btn" target="_blank">👁 Preview Quote</a>
    </div>
    <div class="output-note" id="output-note"></div>
  </div>

</div>

<script>
// LOGIN
function checkLogin(){
  var pw = document.getElementById('pw-input').value;
  if(pw === 'Ichal@786'){
    document.getElementById('login-screen').style.display = 'none';
    initForm();
  } else {
    document.getElementById('login-err').style.display = 'block';
    document.getElementById('pw-input').value = '';
  }
}

function toggleReturn(){
  var type = document.getElementById('trip-type').value;
  document.getElementById('return-card').style.display = type === 'roundtrip' ? 'block' : 'none';
}
function toggleSection(id, cb){
  document.getElementById(id).style.display = cb.checked ? 'block' : 'none';
}

var onwardCount = 0, returnCount = 0, hotelCount = 0;

function addFlight(leg){
  var list = document.getElementById(leg+'-list');
  var id = leg + '-' + (leg==='onward' ? ++onwardCount : ++returnCount);
  var div = document.createElement('div');
  div.className = 'flight-row';
  div.id = id;
  div.innerHTML =
    '<button class="remove-btn" onclick="removeItem(\''+id+'\')">×</button>'+
    '<div class="flight-row-grid">'+
      '<div class="form-group"><label>Airline</label><input type="text" id="'+id+'-airline" placeholder="e.g. IndiGo"></div>'+
      '<div class="form-group"><label>Flight No.</label><input type="text" id="'+id+'-code" placeholder="e.g. 6E-937"></div>'+
      '<div class="form-group"><label>Departure Time</label><input type="time" id="'+id+'-dep"></div>'+
      '<div class="form-group"><label>Arrival Time</label><input type="time" id="'+id+'-arr"></div>'+
      '<div class="form-group"><label>Duration</label><input type="text" id="'+id+'-dur" placeholder="e.g. 2h 55m"></div>'+
      '<div class="form-group"><label>Fare (₹)</label><input type="number" id="'+id+'-fare" placeholder="e.g. 7707"></div>'+
      '<div class="form-group full"><label><input type="checkbox" id="'+id+'-best"> Mark as Best Price</label></div>'+
    '</div>';
  list.appendChild(div);
}

function addHotel(){
  var list = document.getElementById('hotel-list');
  var id = 'hotel-' + ++hotelCount;
  var div = document.createElement('div');
  div.className = 'flight-row';
  div.id = id;
  div.innerHTML =
    '<button class="remove-btn" onclick="removeItem(\''+id+'\')">×</button>'+
    '<div class="flight-row-grid">'+
      '<div class="form-group full"><label>Hotel Name</label><input type="text" id="'+id+'-name" placeholder="e.g. Rove Downtown Dubai"></div>'+
      '<div class="form-group"><label>Star Rating</label><select id="'+id+'-stars"><option>3★</option><option>4★</option><option>5★</option></select></div>'+
      '<div class="form-group"><label>Price per Night (₹)</label><input type="number" id="'+id+'-price" placeholder="e.g. 6500"></div>'+
      '<div class="form-group"><label>No. of Nights</label><input type="number" id="'+id+'-nights" placeholder="e.g. 5" value="1"></div>'+
      '<div class="form-group full"><label>Location / Notes</label><input type="text" id="'+id+'-loc" placeholder="e.g. Near Dubai Mall, Breakfast included"></div>'+
      '<div class="form-group full"><label><input type="checkbox" id="'+id+'-best"> Mark as Recommended</label></div>'+
    '</div>';
  list.appendChild(div);
}

function removeItem(id){
  var el = document.getElementById(id);
  if(el) el.remove();
}

function getFlights(leg){
  var flights = [];
  document.querySelectorAll('[id^="'+leg+'-"]:not([id$="-date"]):not([id$="-from"]):not([id$="-to"])').forEach(function(el){
    if(el.className === 'flight-row'){
      var id = el.id;
      flights.push({
        airline: document.getElementById(id+'-airline').value,
        code: document.getElementById(id+'-code').value,
        dep: document.getElementById(id+'-dep').value,
        arr: document.getElementById(id+'-arr').value,
        dur: document.getElementById(id+'-dur').value,
        fare: parseInt(document.getElementById(id+'-fare').value)||0,
        best: document.getElementById(id+'-best').checked
      });
    }
  });
  return flights.filter(function(f){ return f.airline && f.code; });
}

function getHotels(){
  var hotels = [];
  document.querySelectorAll('[id^="hotel-"]').forEach(function(el){
    if(el.className === 'flight-row'){
      var id = el.id;
      hotels.push({
        name: document.getElementById(id+'-name').value,
        stars: document.getElementById(id+'-stars').value,
        price: parseInt(document.getElementById(id+'-price').value)||0,
        nights: parseInt(document.getElementById(id+'-nights').value)||1,
        loc: document.getElementById(id+'-loc').value,
        best: document.getElementById(id+'-best').checked
      });
    }
  });
  return hotels.filter(function(h){ return h.name; });
}

function generateQuote(){
  var data = {
    client: document.getElementById('client-name').value || 'Valued Client',
    valid: document.getElementById('quote-valid').value,
    fromCity: document.getElementById('from-city').value,
    toCity: document.getElementById('to-city').value,
    tripType: document.getElementById('trip-type').value,
    pax: parseInt(document.getElementById('pax').value)||1,
    onward: {
      date: document.getElementById('onward-date').value,
      from: document.getElementById('onward-from').value.toUpperCase(),
      to: document.getElementById('onward-to').value.toUpperCase(),
      flights: getFlights('onward')
    },
    notes: document.getElementById('extra-notes').value
  };

  if(data.tripType === 'roundtrip'){
    data.return = {
      date: document.getElementById('return-date').value,
      from: document.getElementById('return-from').value.toUpperCase(),
      to: document.getElementById('return-to').value.toUpperCase(),
      flights: getFlights('return')
    };
  }

  if(document.getElementById('hotel-toggle').checked){
    data.hotels = getHotels();
  }

  if(document.getElementById('visa-toggle').checked){
    data.visa = {
      type: document.getElementById('visa-type').value,
      fee: parseInt(document.getElementById('visa-fee').value)||0,
      time: document.getElementById('visa-time').value,
      notes: document.getElementById('visa-notes').value
    };
  }

  var encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
  var baseUrl = window.location.href.replace('admin.html','quote.html');
  var link = baseUrl + '?q=' + encoded;

  document.getElementById('output-box').classList.add('vis');
  document.getElementById('output-link').textContent = link;
  document.getElementById('preview-btn').href = link;

  var minFare = 0;
  if(data.onward.flights.length > 0){
    minFare = Math.min.apply(null, data.onward.flights.map(function(f){return f.fare;}));
  }
  document.getElementById('output-note').innerHTML =
    '✅ Quote ready for <strong>'+data.client+'</strong> · '+data.fromCity+' → '+data.toCity+
    '<br>Copy the link above and paste it in WhatsApp.';

  window.scrollTo({top: document.body.scrollHeight, behavior:'smooth'});
}

function copyLink(){
  var link = document.getElementById('output-link').textContent;
  navigator.clipboard.writeText(link).then(function(){
    var btn = document.querySelector('.copy-btn');
    btn.textContent = '✓ Copied!';
    setTimeout(function(){ btn.textContent = '📋 Copy Link'; }, 2000);
  });
}

function initForm(){
  addFlight('onward');
  addFlight('return');
  // Set default valid date to tomorrow
  var d = new Date(); d.setDate(d.getDate()+1);
  document.getElementById('quote-valid').value = d.toISOString().split('T')[0];
}
</script>
</body>
</html>
