<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Jakariya Holidays · Your Flight Quote</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#D0191A;--red-dark:#a81415;--red-light:#fff0f0;--red-mid:#fecaca;
  --g0:#f9fafb;--g1:#f3f4f6;--g2:#e5e7eb;--g3:#d1d5db;
  --g4:#9ca3af;--g5:#6b7280;--g6:#4b5563;--g9:#111827;
  --wa:#25D366;--wa-dark:#1aab52;
  --blue:#2563EB;--blue-bg:#eff6ff;
  --orange:#EA580C;--orange-bg:#fff7ed;
  --gold:#d97706;--gold-bg:#fffbeb;
  --r:12px;
}
html{-webkit-text-size-adjust:100%}
html,body{width:100%;overflow-x:hidden}
body{font-family:"DM Sans",sans-serif;background:#f0f2f5;min-height:100vh;padding:0 0 100px;color:var(--g9);-webkit-tap-highlight-color:transparent}

/* HEADER */
.header{background:var(--g9);padding:0 16px}
.header-inner{max-width:700px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:12px 0}
.header-logo{height:38px}
.header-tag{font-size:11px;color:var(--g4);text-align:right;line-height:1.4}
.header-tag strong{color:white;display:block;font-size:12px}

/* RED STRIP */
.red-strip{background:var(--red);padding:10px 16px}
.red-strip-inner{max-width:700px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.route-big{font-size:18px;font-weight:700;color:white;letter-spacing:.01em}
.strip-meta{font-size:12px;color:rgba(255,255,255,.75)}

.page{max-width:700px;margin:0 auto;padding:14px 12px}

/* STEPS */
.steps{display:flex;gap:6px;margin-bottom:14px}
.step{flex:1;background:white;border-radius:9px;border:1px solid var(--g2);padding:9px 6px;text-align:center;transition:all .2s}
.step-num{width:22px;height:22px;border-radius:50%;background:var(--g2);color:var(--g5);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 4px;transition:all .2s}
.step.active .step-num{background:var(--g9);color:white}
.step.done .step-num{background:var(--red);color:white}
.step-txt{font-size:10px;color:var(--g4);line-height:1.3;font-weight:500}
.step.active .step-txt,.step.done .step-txt{color:var(--g6)}

/* TABS */
.tabs{display:flex;background:white;border-radius:var(--r);border:1px solid var(--g2);padding:4px;gap:4px;margin-bottom:14px}
.tab{flex:1;padding:11px 6px;border-radius:9px;border:none;background:transparent;font-family:"DM Sans",sans-serif;font-size:13px;font-weight:500;color:var(--g5);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;text-align:center;-webkit-appearance:none;transition:all .2s}
.tab.active{background:var(--g9);color:white}
.tab-sub{font-size:10px;opacity:.7}
.tab-badge{display:none;background:var(--red);color:white;font-size:9px;font-weight:700;padding:2px 8px;border-radius:999px;margin-top:2px}
.tab.done .tab-badge{display:inline-block}

/* SECTION LABEL */
.sec-label{font-size:11px;font-weight:700;color:var(--g4);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}

/* FLIGHT CARDS */
.flights{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.fcard{background:white;border-radius:var(--r);border:2px solid var(--g2);padding:13px 14px;cursor:pointer;position:relative;overflow:visible;touch-action:manipulation;transition:all .15s}
.fcard.best-price{border-color:var(--red)}
.fcard.sel-on{border-color:var(--blue);background:#f8fbff;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.fcard.sel-rt{border-color:var(--orange);background:#fffaf7;box-shadow:0 0 0 3px rgba(234,88,12,.1)}
.fbadge{position:absolute;top:-1px;right:12px;font-size:9px;font-weight:700;padding:3px 9px;border-radius:0 0 7px 7px;letter-spacing:.07em;text-transform:uppercase;pointer-events:none}
.fb-best{background:var(--red);color:white}
.fb-on{background:var(--blue);color:white}
.fb-rt{background:var(--orange);color:white}

.fci{display:flex;flex-direction:column;gap:11px}
.frow1{display:flex;align-items:center;justify-content:space-between}
.fairline{display:flex;align-items:center;gap:9px}
.fai-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.indigo .fai-icon{background:#eef2ff;color:#4f46e5}
.airindia .fai-icon{background:#fffbeb;color:#b45309}
.other .fai-icon{background:#f0fdf4;color:#16a34a}
.fal-name{font-size:13px;font-weight:600}
.ffl-num{font-family:"DM Mono",monospace;font-size:11px;color:var(--g4);margin-top:1px}
.ffare-wrap{text-align:right}
.ffare{font-size:19px;font-weight:700}
.ffare-sub{font-size:10px;color:var(--g4)}

.frow2{display:flex;align-items:center}
.ftb{text-align:center;flex-shrink:0}
.ftm{font-size:22px;font-weight:700;line-height:1}
.fpt{font-size:10px;color:var(--g4);margin-top:2px}
.fmid{flex:1;text-align:center;padding:0 8px}
.fdur-lbl{font-size:10px;color:var(--g4);margin-bottom:3px}
.fln-wrap{display:flex;align-items:center;width:100%}
.fln{flex:1;height:1px;background:var(--g2)}
.fdot{width:4px;height:4px;border-radius:50%;background:var(--g3);flex-shrink:0}
.fnonstop{font-size:9px;color:var(--red);font-weight:700;margin-top:3px;text-transform:uppercase;letter-spacing:.04em}

.fsel-btn{font-family:"DM Sans",sans-serif;font-size:14px;font-weight:600;padding:10px;border-radius:999px;border:1.5px solid var(--g3);background:var(--g0);color:var(--g6);cursor:pointer;width:100%;text-align:center;-webkit-appearance:none;transition:all .15s}
.fcard.sel-on .fsel-btn{background:var(--blue);border-color:var(--blue);color:white}
.fcard.sel-rt .fsel-btn{background:var(--orange);border-color:var(--orange);color:white}

/* HOTEL CARDS */
.hcard{background:white;border-radius:var(--r);border:2px solid var(--g2);padding:13px 14px;cursor:pointer;position:relative;touch-action:manipulation;transition:all .15s;margin-bottom:8px}
.hcard.recommended{border-color:var(--gold)}
.hcard.sel-hotel{border-color:var(--red);background:var(--red-light);box-shadow:0 0 0 3px rgba(208,25,26,.1)}
.hbadge{position:absolute;top:-1px;right:12px;font-size:9px;font-weight:700;padding:3px 9px;border-radius:0 0 7px 7px;letter-spacing:.07em;text-transform:uppercase}
.hb-rec{background:var(--gold);color:white}
.hb-sel{background:var(--red);color:white}
.hrow1{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px}
.hname{font-size:15px;font-weight:700}
.hstars{font-size:12px;color:var(--gold);margin-top:2px}
.hprice-wrap{text-align:right;flex-shrink:0}
.hprice{font-size:18px;font-weight:700}
.hprice-sub{font-size:10px;color:var(--g4)}
.htotal{font-size:12px;color:var(--red);font-weight:600;margin-top:2px}
.hloc{font-size:12px;color:var(--g5);margin-bottom:8px}
.hsel-btn{font-family:"DM Sans",sans-serif;font-size:14px;font-weight:600;padding:10px;border-radius:999px;border:1.5px solid var(--g3);background:var(--g0);color:var(--g6);cursor:pointer;width:100%;text-align:center;-webkit-appearance:none;transition:all .15s}
.hcard.sel-hotel .hsel-btn{background:var(--red);border-color:var(--red);color:white}

/* VISA */
.visa-card{background:white;border-radius:var(--r);border:1px solid var(--g2);padding:14px;margin-bottom:14px}
.visa-title{font-size:13px;font-weight:700;color:var(--g9);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.visa-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.visa-item{background:var(--g0);border-radius:8px;padding:10px 12px}
.visa-item-label{font-size:10px;color:var(--g4);font-weight:600;text-transform:uppercase;margin-bottom:3px}
.visa-item-val{font-size:14px;font-weight:600;color:var(--g9)}
.visa-notes{font-size:12px;color:var(--g5);margin-top:8px;padding:8px 12px;background:var(--gold-bg);border-radius:8px;border-left:3px solid var(--gold)}

/* SUMMARY */
.sbox{background:white;border-radius:var(--r);border:1px solid var(--g2);padding:14px 16px;margin-bottom:14px;display:none}
.sbox.vis{display:block}
.stitle{font-size:12px;font-weight:700;color:var(--g4);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.srow{display:flex;flex-direction:column;gap:8px}
.sc{border-radius:9px;padding:11px 13px;border:1px solid var(--g1)}
.sc-on{background:var(--blue-bg);border-color:#bfdbfe}
.sc-rt{background:var(--orange-bg);border-color:#fed7aa}
.sc-ht{background:var(--red-light);border-color:var(--red-mid)}
.stag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.stag-on{color:var(--blue)}.stag-rt{color:var(--orange)}.stag-ht{color:var(--red)}
.sflight{font-size:14px;font-weight:600}
.sdetail{font-size:12px;color:var(--g5);line-height:1.5;margin-top:2px}
.sfare{font-size:16px;font-weight:700;margin-top:5px}
.sfare-on{color:var(--blue)}.sfare-rt{color:var(--orange)}.sfare-ht{color:var(--red)}
.stotal-row{margin-top:12px;padding-top:12px;border-top:1px solid var(--g2)}
.stotal-label{font-size:12px;color:var(--g5);margin-bottom:2px}
.stotal-amt{font-size:26px;font-weight:700;color:var(--g9)}
.stotal-pax{font-size:11px;color:var(--g4)}

.wa-btn{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--wa);color:white;font-family:"DM Sans",sans-serif;font-size:16px;font-weight:700;padding:16px 24px;border-radius:999px;border:none;cursor:pointer;text-decoration:none;width:100%;margin-top:12px;-webkit-appearance:none}
.wa-btn svg{width:22px;height:22px;fill:white;flex-shrink:0}

/* SECTIONS */
.fsec{display:none}.fsec.active{display:block}

/* VALID BANNER */
.valid-banner{background:var(--red-light);border:1px solid var(--red-mid);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--red-dark);margin-bottom:12px;display:flex;align-items:center;gap:6px}

/* NOTES */
.notes-box{background:white;border-radius:var(--r);border:1px solid var(--g2);padding:12px 14px;margin-bottom:14px;font-size:12px;color:var(--g5);line-height:1.7}
.notes-box strong{color:var(--g9);display:block;margin-bottom:4px;font-size:13px}

/* FOOTER */
.footer{text-align:center;padding:16px;font-size:11px;color:var(--g4);line-height:1.6}
.footer img{height:28px;margin-bottom:6px;display:block;margin-left:auto;margin-right:auto;opacity:.6}

/* LOADING / ERROR */
.loading{text-align:center;padding:80px 20px;color:var(--g4)}
.loading-spinner{width:32px;height:32px;border:3px solid var(--g2);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{text-align:center;padding:60px 20px;color:var(--g5)}
.error-box h2{font-size:20px;margin-bottom:8px;color:var(--g9)}
</style>
</head>

<script>
var WA = '919600222786';
var sel = {onward:null,'return':null,hotel:null};
var Q = null;

function fmt(n){ return '\u20B9'+parseInt(n).toLocaleString('en-IN'); }
function fmtDate(d){
  if(!d) return '';
  var parts = d.split('-');
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return parseInt(parts[2])+' '+months[parseInt(parts[1])-1]+' '+parts[0];
}

function airlineClass(name){
  var n = (name||'').toLowerCase();
  if(n.indexOf('indigo')>-1 || n.indexOf('6e')>-1) return 'indigo';
  if(n.indexOf('air india')>-1 || n.indexOf('ai-')>-1) return 'airindia';
  return 'other';
}
function airlineIcon(name){
  var n = (name||'').toLowerCase();
  if(n.indexOf('indigo')>-1) return '6E';
  if(n.indexOf('air india')>-1) return 'AI';
  var words = name.trim().split(' ');
  return words.length > 1 ? (words[0][0]+words[1][0]).toUpperCase() : name.substring(0,2).toUpperCase();
}

function buildFlightCard(f, leg, idx){
  var ac = airlineClass(f.airline);
  var bestBadge = f.best ? '<div class="fbadge fb-best">Best Price</div>' : '';
  var btnTxt = leg==='onward' ? 'Select Onward Flight' : 'Select Return Flight';
  return '<div class="fcard '+(f.best?'best-price ':'')+ac+'" '+
    'data-leg="'+leg+'" data-idx="'+idx+'" onclick="selectFlight(this,'+idx+')">' +
    bestBadge +
    '<div class="fci">'+
      '<div class="frow1">'+
        '<div class="fairline">'+
          '<div class="fai-icon">'+airlineIcon(f.airline)+'</div>'+
          '<div><div class="fal-name">'+f.airline+'</div><div class="ffl-num">'+f.code+'</div></div>'+
        '</div>'+
        '<div class="ffare-wrap"><div class="ffare">'+fmt(f.fare)+'</div><div class="ffare-sub">per person</div></div>'+
      '</div>'+
      '<div class="frow2">'+
        '<div class="ftb"><div class="ftm">'+f.dep+'</div><div class="fpt">'+Q[leg].from+' &middot; '+fmtDate(Q[leg].date).split(' ').slice(0,1).join('')+'</div></div>'+
        '<div class="fmid"><div class="fdur-lbl">'+f.dur+'</div><div class="fln-wrap"><div class="fdot"></div><div class="fln"></div><div class="fdot"></div></div><div class="fnonstop">Non-stop</div></div>'+
        '<div class="ftb"><div class="ftm">'+f.arr+'</div><div class="fpt">'+Q[leg].to+'</div></div>'+
      '</div>'+
      '<button class="fsel-btn">'+btnTxt+'</button>'+
    '</div></div>';
}

function buildHotelCard(h, idx){
  var bestBadge = h.best ? '<div class="hbadge hb-rec">Recommended</div>' : '';
  var totalCost = h.price * h.nights;
  return '<div class="hcard '+(h.best?'recommended':'')+'" data-idx="'+idx+'" onclick="selectHotel(this,'+idx+')">'+
    bestBadge+
    '<div class="hrow1">'+
      '<div><div class="hname">'+h.name+'</div><div class="hstars">'+h.stars+'</div></div>'+
      '<div class="hprice-wrap"><div class="hprice">'+fmt(h.price)+'</div><div class="hprice-sub">per night</div><div class="htotal">Total: '+fmt(totalCost)+'</div></div>'+
    '</div>'+
    (h.loc ? '<div class="hloc">📍 '+h.loc+'</div>' : '')+
    '<button class="hsel-btn">Select This Hotel</button>'+
  '</div>';
}

function renderApp(){
  var html = '';

  // Valid banner
  if(Q.valid){
    html += '<div class="valid-banner">⏰ This quote is valid until <strong>'+fmtDate(Q.valid)+'</strong>. Prices subject to availability.</div>';
  }

  // Steps
  var step3 = Q.hotels && Q.hotels.length > 0;
  html += '<div class="steps">'+
    '<div class="step active" id="step1"><div class="step-num" id="sn1">1</div><div class="step-txt">Onward<br>Flight</div></div>'+
    (Q.tripType==='roundtrip' ? '<div class="step" id="step2"><div class="step-num" id="sn2">2</div><div class="step-txt">Return<br>Flight</div></div>' : '')+
    (step3 ? '<div class="step" id="step3"><div class="step-num" id="sn3">'+(Q.tripType==='roundtrip'?3:2)+'</div><div class="step-txt">Hotel<br>Option</div></div>' : '')+
    '<div class="step" id="step-book"><div class="step-num" id="sn-book">'+(Q.tripType==='roundtrip'?(step3?4:3):(step3?3:2))+'</div><div class="step-txt">Book via<br>WhatsApp</div></div>'+
  '</div>';

  // Tabs
  var tabs = '<div class="tabs"><button class="tab active" id="tab-on" onclick="switchTab(\'onward\')"><span>✈ Onward</span><span class="tab-sub">'+Q.onward.from+' → '+Q.onward.to+' &middot; '+fmtDate(Q.onward.date)+'</span><span class="tab-badge">✓ Selected</span></button>';
  if(Q.tripType==='roundtrip') tabs += '<button class="tab" id="tab-rt" onclick="switchTab(\'return\')"><span>✈ Return</span><span class="tab-sub">'+Q['return'].from+' → '+Q['return'].to+' &middot; '+fmtDate(Q['return'].date)+'</span><span class="tab-badge">✓ Selected</span></button>';
  if(Q.hotels && Q.hotels.length) tabs += '<button class="tab" id="tab-ht" onclick="switchTab(\'hotel\')"><span>🏨 Hotels</span><span class="tab-sub">'+Q.hotels.length+' options</span><span class="tab-badge">✓ Selected</span></button>';
  tabs += '</div>';
  html += tabs;

  // Onward flights
  var onwardCards = Q.onward.flights.map(function(f,i){ return buildFlightCard(f,'onward',i); }).join('');
  html += '<div id="sec-onward" class="fsec active">'+
    '<div class="sec-label"><span>'+Q.onward.from+' → '+Q.onward.to+'</span><span>'+fmtDate(Q.onward.date)+'</span></div>'+
    '<div class="flights">'+onwardCards+'</div>'+
  '</div>';

  // Return flights
  if(Q.tripType==='roundtrip' && Q['return']){
    var returnCards = Q['return'].flights.map(function(f,i){ return buildFlightCard(f,'return',i); }).join('');
    html += '<div id="sec-return" class="fsec">'+
      '<div class="sec-label"><span>'+Q['return'].from+' → '+Q['return'].to+'</span><span>'+fmtDate(Q['return'].date)+'</span></div>'+
      '<div class="flights">'+returnCards+'</div>'+
    '</div>';
  }

  // Hotels
  if(Q.hotels && Q.hotels.length){
    var hotelCards = Q.hotels.map(function(h,i){ return buildHotelCard(h,i); }).join('');
    html += '<div id="sec-hotel" class="fsec">'+
      '<div class="sec-label"><span>🏨 Hotel Options</span><span>'+Q.toCity+'</span></div>'+

  // Visa

function switchTab(leg){
  ['on','rt','ht'].forEach(function(t){
    var tab = document.getElementById('tab-'+t);
    var sec = document.getElementById('sec-'+(t==='on'?'onward':t==='rt'?'return':'hotel'));
    if(tab) tab.classList.remove('active');
    if(sec) sec.classList.remove('active');
  });
  var tabId = leg==='onward'?'on':leg==='return'?'rt':'ht';
  var secId = leg==='onward'?'onward':leg==='return'?'return':'hotel';
  var tabEl = document.getElementById('tab-'+tabId);
  var secEl = document.getElementById('sec-'+secId);
  if(tabEl) tabEl.classList.add('active');
  if(secEl) secEl.classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

function selectFlight(card, idx){
  var leg = card.dataset.leg;
  var selClass = leg==='onward' ? 'sel-on' : 'sel-rt';
  document.querySelectorAll('.fcard[data-leg="'+leg+'"]').forEach(function(c){
    c.classList.remove('sel-on','sel-rt');
    var ob = c.querySelector('.fb-on,.fb-rt');
    if(ob) ob.remove();
    c.querySelector('.fsel-btn').textContent = leg==='onward'?'Select Onward Flight':'Select Return Flight';
  });
  card.classList.add(selClass);
  card.querySelector('.fsel-btn').textContent = '\u2713 Selected!';
  if(!card.querySelector('.fb-on,.fb-rt')){
    var b = document.createElement('div');
    b.className = 'fbadge '+(leg==='onward'?'fb-on':'fb-rt');
    b.textContent = leg==='onward'?'\u2708 Onward':'\u2708 Return';
    card.appendChild(b);
  }
  sel[leg] = Q[leg].flights[idx];
  sel[leg]._leg = leg;
  sel[leg]._from = Q[leg].from;
  sel[leg]._to = Q[leg].to;
  sel[leg]._date = Q[leg].date;

  var tabId = leg==='onward'?'tab-on':'tab-rt';
  var tabEl = document.getElementById(tabId);
  if(tabEl) tabEl.classList.add('done');

  updateSteps();
  updateSummary();

  if(leg==='onward'){
    setTimeout(function(){
      if(Q.tripType==='roundtrip') switchTab('return');
      else if(Q.hotels && Q.hotels.length) switchTab('hotel');
    }, 380);
  } else if(leg==='return'){
    if(Q.hotels && Q.hotels.length){
      setTimeout(function(){ switchTab('hotel'); }, 380);
    } else {
      setTimeout(function(){ document.getElementById('sbox').scrollIntoView({behavior:'smooth',block:'start'}); }, 300);
    }
  }
}

function selectHotel(card, idx){
  document.querySelectorAll('.hcard').forEach(function(c){
    c.classList.remove('sel-hotel');
    var ob = c.querySelector('.hb-sel');
    if(ob) ob.remove();
    c.querySelector('.hsel-btn').textContent = 'Select This Hotel';
  });
  card.classList.add('sel-hotel');
  card.querySelector('.hsel-btn').textContent = '\u2713 Selected!';
  if(!card.querySelector('.hb-sel')){
    var b = document.createElement('div');
    b.className = 'hbadge hb-sel';
    b.textContent = '\u2713 Your Pick';
    card.appendChild(b);
  }
  sel.hotel = Q.hotels[idx];
  var tabHt = document.getElementById('tab-ht');
  if(tabHt) tabHt.classList.add('done');
  updateSteps();
  updateSummary();
  setTimeout(function(){ document.getElementById('sbox').scrollIntoView({behavior:'smooth',block:'start'}); }, 300);
}

function updateSteps(){
  if(sel.onward){ markStep('step1','sn1'); }
  if(sel['return']){ markStep('step2','sn2'); }
  if(sel.hotel){ markStep('step3','sn3'); }
  if(sel.onward && (!Q['return'] || sel['return']) && (!Q.hotels || !Q.hotels.length || sel.hotel)){
    markStep('step-book','sn-book');
  }
}
function markStep(sid, nid){
  var s = document.getElementById(sid);
  var n = document.getElementById(nid);
  if(s){ s.classList.remove('active'); s.classList.add('done'); }
  if(n) n.textContent = '\u2713';
}

function updateSummary(){
  var box = document.getElementById('sbox');
  if(!sel.onward && !sel['return'] && !sel.hotel){ box.classList.remove('vis'); return; }
  box.classList.add('vis');

  var total = 0;
  if(sel.onward){
    document.getElementById('sc-on').style.display='block';
    document.getElementById('sf-on').textContent = sel.onward.airline+' '+sel.onward.code;
    document.getElementById('sd-on').textContent = sel.onward._from+' '+sel.onward.dep+' → '+sel.onward._to+' '+sel.onward.arr+' · '+sel.onward.dur+' · '+fmtDate(sel.onward._date);
    document.getElementById('sfare-on').textContent = fmt(sel.onward.fare)+' per person';
    total += sel.onward.fare;
  }
  if(sel['return']){
    document.getElementById('sc-rt').style.display='block';
    document.getElementById('sf-rt').textContent = sel['return'].airline+' '+sel['return'].code;
    document.getElementById('sd-rt').textContent = sel['return']._from+' '+sel['return'].dep+' → '+sel['return']._to+' '+sel['return'].arr+' · '+sel['return'].dur+' · '+fmtDate(sel['return']._date);
    document.getElementById('sfare-rt').textContent = fmt(sel['return'].fare)+' per person';
    total += sel['return'].fare;
  }
  if(sel.hotel){
    var htTotal = sel.hotel.price * sel.hotel.nights;
    document.getElementById('sc-ht').style.display='block';
    document.getElementById('sf-ht').textContent = sel.hotel.name+' '+sel.hotel.stars;
    document.getElementById('sd-ht').textContent = sel.hotel.loc+' · '+sel.hotel.nights+' night'+(sel.hotel.nights>1?'s':'');
    document.getElementById('sfare-ht').textContent = fmt(htTotal)+' total hotel';
    total += htTotal;
  }
  if(Q.visa){ total += Q.visa.fee || 0; }

  document.getElementById('tamt').textContent = fmt(total);
  var pax = Q.pax || 1;
  document.getElementById('tpax').textContent = pax > 1 ? '× '+pax+' passengers = '+fmt(total*pax)+' total' : '';

  // Build WhatsApp message
  var msg = 'Hi Jakariya Holidays!%0A%0AI would like to book:%0A%0A';
  if(sel.onward) msg += '%E2%9C%88%EF%B8%8F *Onward Flight*%0A'+encodeURIComponent(sel.onward.airline+' '+sel.onward.code)+'%0A'+sel.onward._from+' '+sel.onward.dep+' → '+sel.onward._to+' '+sel.onward.arr+'%0ADate: '+fmtDate(sel.onward._date)+'%0ADuration: '+sel.onward.dur+'%0AFare: '+fmt(sel.onward.fare)+' per person%0A%0A';
  if(sel['return']) msg += '%E2%9C%88%EF%B8%8F *Return Flight*%0A'+encodeURIComponent(sel['return'].airline+' '+sel['return'].code)+'%0A'+sel['return']._from+' '+sel['return'].dep+' → '+sel['return']._to+' '+sel['return'].arr+'%0ADate: '+fmtDate(sel['return']._date)+'%0ADuration: '+sel['return'].dur+'%0AFare: '+fmt(sel['return'].fare)+' per person%0A%0A';
  if(sel.hotel) msg += '%F0%9F%8F%A8 *Hotel*%0A'+encodeURIComponent(sel.hotel.name+' '+sel.hotel.stars)+'%0A'+sel.hotel.nights+' nights · '+fmt(sel.hotel.price)+'/night%0ATotal: '+fmt(sel.hotel.price*sel.hotel.nights)+'%0A%0A';
  if(Q.visa) msg += '%F0%9F%9B%82 *Visa*%0A'+encodeURIComponent(Q.visa.type)+'%0AFee: '+fmt(Q.visa.fee)+'%0A%0A';
  msg += '*Total: '+fmt(total)+' per person*';
  if(pax>1) msg += ' (%C3%97'+pax+' = '+fmt(total*pax)+' total)';
  msg += '%0A%0APassengers: '+pax+'%0APlease confirm availability.';
  document.getElementById('wa-btn').href = 'https://wa.me/'+WA+'?text='+msg;
}

// INIT
(function(){
  var params = new URLSearchParams(window.location.search);
  var q = params.get('q');
  if(!q){ document.getElementById('app').innerHTML='<div class="error-box"><h2>No quote found</h2><p>Please contact Jakariya Holidays for your quote.</p></div>'; return; }
  try{
    Q = JSON.parse(decodeURIComponent(escape(atob(q))));
    document.getElementById('client-greeting').textContent = 'Hi, '+Q.client+'!';
    document.getElementById('valid-tag').textContent = Q.valid ? 'Valid till '+fmtDate(Q.valid) : '';
    var tripLabel = Q.tripType==='roundtrip' ? 'Round Trip' : 'One Way';
    document.getElementById('route-display').textContent = (Q.fromCity||Q.onward.from)+' → '+(Q.toCity||Q.onward.to);
    document.getElementById('strip-meta').textContent = tripLabel+' · '+Q.pax+' Passenger'+(Q.pax>1?'s':'');
    renderApp();
  } catch(e){
    document.getElementById('app').innerHTML='<div class="error-box"><h2>Invalid quote link</h2><p>Please contact Jakariya Holidays for a new quote.</p></div>';
  }
})();
</script>
